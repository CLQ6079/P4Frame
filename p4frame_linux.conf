{
  "DISPLAY": {
    "screen_width": 2560,
    "screen_height": 1080,
    "fullscreen": true,
    "photo_anchor": "nw",
    "hide_cursor": true,
    "background_color": "black"
  },
  "MEDIA": {
    "media_directory": "/mnt/miao_samba/study/lgy_photoframe/data",
    "photo_delay": 5000,
    "refresh_interval": 300000,
    "supported_image_formats": [
      ".jpg",
      ".jpeg",
      ".png",
      ".bmp",
      ".gif"
    ],
    "supported_video_formats": [
      ".mp4",
      ".avi",
      ".mov",
      ".mkv",
      ".wmv",
      ".flv",
      ".webm",
      ".m4v"
    ]
  },
  "VIDEO_CONVERSION": {
    "enabled": true,
    "check_interval": 60,
    "cpu_cores": 2,
    "delete_originals": true,
    "converted_subfolder": "converted",
    "tmp_extension": ".tmp",
    "codec": "libx264",
    "preset": "fast",
    "crf": 23,
    "max_bitrate": "3M",
    "buffer_size": "6M",
    "profile": "main",
    "level": "4.0",
    "audio_codec": "aac",
    "audio_bitrate": "128k",
    "framerate": "30",
    "timeout": 3600
  },
  "LOGGING": {
    "enabled": true,
    "log_directory": "/home/joey/Coding/P4Frame/logs",
    "log_level": "INFO",
    "log_to_console": true,
    "log_to_file": true
  },
  "SLIDESHOW": {
    "batch_size": 10,
    "border_size": 30,
    "border_height": 50,
    "adaptive_top_height": 60,
    "preload_ahead": true,
    "show_progress": true,
    "show_timestamps": true
  },
  "VIDEO_PLAYER": {
    "enabled": true,
    "scale_factor": 0.9,
    "vlc_options": "--no-video-title-show --quiet --no-audio --avcodec-hw=any --vout=x11 --verbose=0 --intf=dummy --no-stats --no-osd",
    "gradient_start": [
      20,
      20,
      60
    ],
    "gradient_end": [
      50,
      30,
      100
    ]
  },
  "SYSTEM": {
    "virtual_display": ":0.0",
    "escape_key_exit": true,
    "key_debounce_time": 0.5
  },
  "USER": {
    "user": "joey",
    "group": "joey",
    "working_directory": "/home/joey/Coding/P4Frame"
  },
  "DEBUG": {
    "enabled": false,
    "verbose_logging": false,
    "show_fps": false,
    "show_media_info": true
  },
  "MEMORY_MANAGEMENT": {
    "max_cached_images": 3,
    "image_cache_ttl": 600,
    "force_gc_interval": 3600,
    "enable_memory_monitoring": true,
    "memory_limit_mb": 600
  },
  "WEATHER": {
    "enabled": true,
    "locations": ["Mountlake Terrace, WA"],
    "units": "both",
    "update_interval_minutes": 240
  }
}